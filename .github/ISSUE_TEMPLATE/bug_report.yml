name: Bug report
description: Create a bug report to help us improve
labels: ['bug']
body:
  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Provide environment information
      description: OS, Node.js version (`node -v`), crunes version (`crunes --version`).
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Commands or steps contributors can follow to reproduce the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
